# Nginx config for the frontend container.
# Serves the Vite static build AND reverse-proxies the API to the backend
# container (service name "api" on the compose network) → no CORS needed.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # SPA fallback — react-router handles unknown routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → backend container.
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
